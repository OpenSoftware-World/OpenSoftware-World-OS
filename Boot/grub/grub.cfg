set timeout=20
set default=0

insmod all_video
insmod gfxterm
insmod font

set gfxmode=2560x1440,1920x1080,1600x900,1280x720,auto

loadfont /boot/grub/fonts/unicode.pf2

terminal_output gfxterm

menuentry "OpenSoftware-World OS 2.0" {
    multiboot /boot/os.bin
}

menuentry "About OpenSoftware-World OS 2.0" {
    echo "OpenSoftware-World OS 2.0 - Experimental OS by OpenSoftware-World"
    echo "This is a minimal kernel environment with shell and drivers."
    echo "Have fun exploring!"
    sleep 10 
}

menuentry "UEFI Firmware Settings" {
    fwsetup
    echo "This option requires EFI mode."
}